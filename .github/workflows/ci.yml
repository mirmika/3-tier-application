name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 
jobs:
  build-test-and-docker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: basic3tier
        ports:
          - 5432:5432

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: basic3tier
      DB_USER: postgres
      DB_PASSWORD: admin123

    steps:
      # Step to check out the repository
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up .NET SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      # Run tests and build .NET project
      - name: Install dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test with the dotnet CLI
        run: dotnet test --no-build

      # Upload .NET test results as artifacts
      - name: Upload dotnet test results
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-results
          path: TestResults

      # Set up DockerHub credentials
      - name: Set up DockerHub credentials
        uses: docker/login-action@v2.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and test Backend API
      - name: Build and test Backend API
        run: |
          cd ./api
          docker build -t mirmika/backend:latest .
          docker run --rm mirmika/backend:latest

      # Build and test Frontend UI
      - name: Build and test Frontend UI
        run: |
          cd ./ui 
          docker build -t mirmika/frontend:latest . 
          docker run --rm mirmika/frontend:latest

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner
          
      - name: Build and analyze
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin /k:"3-tier-application" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
          dotnet build
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # Tag Docker images with commit SHA
      - name: Tag Docker Images with commit SHA
        run: |
          docker tag mirmika/backend:latest mirmika/backend:${{ github.sha }}
          docker tag mirmika/frontend:latest mirmika/frontend:${{ github.sha }}

      # Push Docker Images to DockerHub
      - name: Push Docker Images to DockerHub
        run: |
          docker push mirmika/backend:latest
          docker push mirmika/frontend:latest
          docker push mirmika/backend:${{ github.sha }}
          docker push mirmika/frontend:${{ github.sha }}
