name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 
jobs:
  build-test-and-docker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: basic3tier
        ports:
          - 5432:5432

    env:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: basic3tier
      DB_USER: postgres
      DB_PASSWORD: admin123
      #SONAR_SCANNER_OPTS: "-Dhttp.nonProxyHosts=\"*.domain.com\""

    steps:
      - name: Check Memory Usage
        run: free -m

      - name: List all running containers
        run: docker ps -a

      - name: Get Container Name
        id: get_container_name  # Ensure this is your step's id
        run: |
         container_name=$(docker ps -a --format "{{.Names}}")
         echo "Container name is: $container_name"
         echo "::set-output name=container_name::$container_name"

      - name: View PostgreSQL Logs
        run: |
         docker logs ${{ steps.get_container_name.outputs.container_name }}
    
      - name: Test PostgreSQL Connection
        run: |
         echo "Waiting for PostgreSQL connection..."
         until PGPASSWORD=admin123 psql -h postgres -U postgres -d basic3tier -c "SELECT 1;" 2>/dev/null; do
         echo "Waiting for PostgreSQL to be ready..."
         sleep 5
         done
         echo "PostgreSQL is ready!"


      - name: Test PostgreSQL Connection
        run: PGPASSWORD=admin123 psql -h postgres -U postgres -d basic3tier -c "SELECT 1;"

     # Step to check out the repository
      - name: Check out repository
        uses: actions/checkout@v4

      # Upload .NET test results as artifacts
      - name: Upload dotnet test results
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-results
          path: TestResults

      # Set up DockerHub credentials
      - name: Set up DockerHub credentials
        uses: docker/login-action@v2.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and test Backend API
      - name: Build and test Backend API
        run: |
          cd ./api
          docker build -t mirmika/backend:latest .
          docker run --rm mirmika/backend:latest

      # Build and test Frontend UI
      - name: Build and test Frontend UI
        run: |
          cd ./ui 
          docker build -t mirmika/frontend:latest . 
          docker run --rm mirmika/frontend:latest

      # Tag Docker images with commit SHA
      - name: Tag Docker Images with commit SHA
        run: |
          docker tag mirmika/backend:latest mirmika/backend:${{ github.sha }}
          docker tag mirmika/frontend:latest mirmika/frontend:${{ github.sha }}

      # Push Docker Images to DockerHub
      - name: Push Docker Images to DockerHub
        run: |
          docker push mirmika/backend:latest
          docker push mirmika/frontend:latest
          docker push mirmika/backend:${{ github.sha }}
          docker push mirmika/frontend:${{ github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarScanner
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: Build and analyze
        shell: bash
        run: |
          # Run SonarQube scan
          dotnet-sonarscanner begin /k:"3-tier-application" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"

          # Specify your project or solution path in the build command
          dotnet build ./api/Basic3Tier.Core/Basic3Tier.Core.csproj --configuration Release

          # End SonarQube scan
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"        
