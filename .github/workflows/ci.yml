name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 

jobs:
  build-test-and-docker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: basic3tier
        ports:
          - 5432:5432
        options: >-
         --health-cmd="pg_isready -U postgres"
         --health-interval=10s
         --health-timeout=5s
         --health-retries=5
         --memory=4g
         --cpus=4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Docker Network
        run: |
          docker network create mynetwork

      - name: Start PostgreSQL container and connect to mynetwork
        run: |
          docker run -d --name postgres \
            --network mynetwork \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=admin123 \
            -e POSTGRES_DB=basic3tier \
            postgres:15-alpine

      - name: List all running containers
        run: docker ps -a

      - name: Debug PostgreSQL Logs
        run: docker logs ${{ job.services.postgres.id }}

      - name: Verify PostgreSQL Service is Running
        run: |
         echo "Checking if PostgreSQL is ready..."
         until PGPASSWORD=admin123 psql -h postgres -U postgres -d basic3tier -c "SELECT 1;"; do
         echo "Waiting for PostgreSQL..."
         sleep 15
         done
         echo "PostgreSQL is ready!"

      - name: Build and test Backend API
        run: |
          cd ./api
          docker build -t mirmika/backend:latest .
         

      - name: Build and test Frontend UI
        run: |
          cd ./ui 
          docker build -t mirmika/frontend:latest . 
          

      - name: Tag Docker Images with commit SHA
        run: |
          docker tag mirmika/backend:latest mirmika/backend:${{ github.sha }}
          docker tag mirmika/frontend:latest mirmika/frontend:${{ github.sha }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Images to DockerHub
        run: |
          docker push mirmika/backend:latest
          docker push mirmika/frontend:latest
          docker push mirmika/backend:${{ github.sha }}
          docker push mirmika/frontend:${{ github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarScanner
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: Build and analyze
        shell: bash
        run: |
          dotnet-sonarscanner begin /k:"3-tier-application" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
          dotnet build ./api/Basic3Tier.Core/Basic3Tier.Core.csproj --configuration Release
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
