name: CD Pipeline

on:
  push:
    branches:
      - main  # Trigger the pipeline on push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    - name: Set correct permissions on SSH private key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Add EC2 to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

    - name: Deploy Docker Containers to EC2
      run: |
        ssh ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          # Ensure user has Docker permissions (add to the docker group)
          sudo usermod -aG docker ubuntu

          # Pull latest Docker images
          sudo docker pull mirmika/backend:latest
          sudo docker pull mirmika/frontend:latest

          # Stop and remove old containers if they exist
          sudo docker rm -f backend frontend || true

          # Run the backend container on port 5000
          sudo docker run -d -p 5000:5000 --name backend mirmika/backend:latest

          # Run the frontend container on port 80
          sudo docker run -d -p 80:80 --name frontend mirmika/frontend:latest
        EOF
