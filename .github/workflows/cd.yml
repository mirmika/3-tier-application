name: CD Pipeline

on:
  #workflow_dispatch:
  push:
   branches:
   - main  # trigger the pipeline on push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    - name: Set correct permissions on SSH private key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Add EC2 to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

    - name: Deploy Docker Containers to EC2
      run: |
        ssh ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          # Ensure user has Docker permissions (add to the docker group)
          sudo usermod -aG docker ubuntu

          # Pull latest Docker images
          sudo docker pull mirmika/backend:latest
          sudo docker pull mirmika/frontend:latest

          # Stop and remove old containers if they exist
          sudo docker rm -f backend frontend || true

         # Run the backend container on port 5000
         sudo docker run -d --name backend-api --network my3tier -p 5000:5000 \
         -e DATABASE_URL=postgresql://postgres:admin123@my-db:5432/basic3tier \
          mirmika/backend:latest

         # Run the frontend container on port 80
         sudo docker run -d --name frontend-api --network my3tier -p 80:80 \
         mirmika/frontend:latest
         
        EOF
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

    - name: Cache SonarQube packages
      uses: actions/cache@v4
      with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

    - name: Cache SonarQube scanner
      id: cache-sonar-scanner
      uses: actions/cache@v4
      with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

    - name: Install SonarScanner
      run: |
        dotnet tool install --global dotnet-sonarscanner

    - name: Build and analyze
      shell: bash
      run: |
        # Run SonarQube scan
        dotnet-sonarscanner begin /k:"3-tier-application" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"

        # Specify your project or solution path in the build command
        dotnet build ./api/Basic3Tier.Core/Basic3Tier.Core.csproj --configuration Release

        # End SonarQube scan
        dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"