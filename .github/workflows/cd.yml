name: CD Pipeline

on:
  push:
    branches:
      - main  # Trigger the pipeline on push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
     - name: Set up JDK 17
       uses: actions/setup-java@v4
       with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

     - name: Cache SonarQube packages
       uses: actions/cache@v4
       with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

     - name: Cache SonarQube scanner
       id: cache-sonar-scanner
       uses: actions/cache@v4
       with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

     - name: Install SonarQube scanner
       if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
       run: |
        mkdir -p ./.sonar/scanner  # Create the directory using bash
        dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

          # SonarQube Build and Analysis (Bash shell used)
     - name: Build and analyze
       shell: bash
       run: |
          .\.sonar\scanner\dotnet-sonarscanner begin /k:"3-tier-application" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
          dotnet build
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"


      # Tag Docker images with commit SHA
     - name: Tag Docker Images with commit SHA
       run: |
          docker tag mirmika/backend:latest mirmika/backend:${{ github.sha }}
          docker tag mirmika/frontend:latest mirmika/frontend:${{ github.sha }}

     - name: Checkout code
       uses: actions/checkout@v4

     - name: Set up SSH
       uses: webfactory/ssh-agent@v0.5.3
       with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

     - name: Set correct permissions on SSH private key
       run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

     - name: Add EC2 to known hosts
       run: |
        ssh-keyscan -H ${{ secrets.EC2_PUBLIC_IP }} >> ~/.ssh/known_hosts

     - name: Deploy Docker Containers to EC2
       run: |
        ssh ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          # Ensure user has Docker permissions (add to the docker group)
          sudo usermod -aG docker ubuntu

          # Pull latest Docker images
          sudo docker pull mirmika/backend:latest
          sudo docker pull mirmika/frontend:latest

          # Stop and remove old containers if they exist
          sudo docker rm -f backend frontend || true

          # Run the backend container on port 5000
          sudo docker run -d -p 5000:5000 --name backend mirmika/backend:latest

          # Run the frontend container on port 80
          sudo docker run -d -p 80:80 --name frontend mirmika/frontend:latest
        EOF
